services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - '3000:3000'
    environment:
      PORT: '3000'
      XIANXIA_DATA_DIR: /data
      XIANXIA_OPENAI_API_KEY: ${XIANXIA_OPENAI_API_KEY:-}
      XIANXIA_OPENAI_BASE_URL: ${XIANXIA_OPENAI_BASE_URL:-https://coderelay.cn/v1}
      XIANXIA_ANTHROPIC_API_KEY: ${XIANXIA_ANTHROPIC_API_KEY:-}
      XIANXIA_ANTHROPIC_BASE_URL: ${XIANXIA_ANTHROPIC_BASE_URL:-https://coderelay.cn}
    volumes:
      - xianxia-data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://127.0.0.1:3000
    ports:
      - '5173:80'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  xianxia-data:
